const W = 1280, H = 720;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

// ─── MOBILE DETECTION ───
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || (navigator.maxTouchPoints > 1 && !/Win/.test(navigator.platform));
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isAndroid = /Android/i.test(navigator.userAgent);

// ─── HIDDEN INPUT FOR MOBILE KEYBOARD ───
const mobileInput = document.createElement('textarea');
mobileInput.setAttribute('autocomplete', 'off');
mobileInput.setAttribute('autocorrect', 'off');
mobileInput.setAttribute('autocapitalize', 'none');
mobileInput.setAttribute('spellcheck', 'false');
mobileInput.setAttribute('enterkeyhint', 'done');
mobileInput.style.cssText = [
  'position:fixed',
  'bottom:0',
  'left:0',
  'width:100%',
  'height:3px',
  'font-size:16px',
  'opacity:0',
  'border:none',
  'outline:none',
  'padding:0',
  'margin:0',
  'resize:none',
  'background:transparent',
  'color:transparent',
  'caret-color:transparent',
  'pointer-events:none',
  'z-index:9999',
].join(';');
document.body.appendChild(mobileInput);

let mobileInputActive = false;
const MOBILE_SENTINEL = '\u200B';

function activateMobileInput() {
  if (!isMobile) return;
  mobileInputActive = true;
  mobileInput.value = MOBILE_SENTINEL;
  mobileInput.style.pointerEvents = 'auto';
  // Android: focus() works fine outside gesture handler
  if (isAndroid) mobileInput.focus();
  // iOS: focus was already called in touchend handler
}
function deactivateMobileInput() {
  if (!isMobile) return;
  mobileInputActive = false;
  mobileInput.style.pointerEvents = 'none';
  mobileInput.blur();
}

mobileInput.addEventListener('input', () => {
  if (!mobileInputActive) { mobileInput.value = MOBILE_SENTINEL; return; }
  const val = mobileInput.value;
  // anything longer than sentinel = new character(s)
  if (val.length > 1) {
    charTyped += val.replace(MOBILE_SENTINEL, '');
  } else if (val.length === 0) {
    keyPressed = 'Backspace';
  }
  mobileInput.value = MOBILE_SENTINEL;
});
mobileInput.addEventListener('keydown', e => {
  if (!mobileInputActive) return;
  if (e.key === 'Enter' || e.key === 'Go') { keyPressed = 'Enter'; e.preventDefault(); }
  if (e.key === 'Escape') keyPressed = 'Escape';
  if (e.key === 'Backspace') { keyPressed = 'Backspace'; }
});

// ─── TOUCH EVENTS ───
function getTouchPos(t) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - r.left) * (W / r.width),
    y: (t.clientY - r.top)  * (H / r.height),
  };
}

let _isPinching = false;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    _isPinching = false;
    const p = getTouchPos(e.touches[0]);
    mouse.x = p.x; mouse.y = p.y;
    mouse.down = true;
  }
  if (e.touches.length === 2) {
    _isPinching = true;
    mouse.down = false;
    _pinchStartDist = _pinchDist(e.touches);
    _pinchBaseScale = _pinchCurrentScale;
  }
}, {passive: false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) {
    // All fingers lifted
    if (!_isPinching && e.changedTouches.length) {
      const p = getTouchPos(e.changedTouches[0]);
      mouse.x = p.x; mouse.y = p.y;
      mouse.clicked = true;
    }
    _isPinching = false;
    mouse.down = false;
    mouse.released = true;
  } else if (e.touches.length === 1) {
    // One finger still down after pinch — don't fire click
    _isPinching = false;
  }

  // iOS keyboard: focus must happen synchronously here
  if (isIOS) {
    if (mobileInputActive) {
      mobileInput.focus();
    } else {
      mobileInput.style.pointerEvents = 'auto';
      mobileInput.focus();
      setTimeout(() => { if (!mobileInputActive) { mobileInput.blur(); mobileInput.style.pointerEvents = 'none'; } }, 300);
    }
  }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    _isPinching = true;
    const dist = _pinchDist(e.touches);
    applyZoom(_pinchBaseScale * (dist / _pinchStartDist));
  } else if (e.touches.length === 1 && !_isPinching) {
    const p = getTouchPos(e.touches[0]);
    mouse.x = p.x; mouse.y = p.y;
  }
}, {passive: false});

// ─── PINCH TO ZOOM (iOS only) ───
let _pinchBaseScale = 1;
let _pinchCurrentScale = 1;
let _pinchStartDist = 0;
const ZOOM_MIN = 0.5;
const ZOOM_MAX = 3.0;

function _pinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function applyZoom(scale) {
  _pinchCurrentScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, scale));
  const base = Math.min(window.innerWidth / W, window.innerHeight / H);
  const s = base * _pinchCurrentScale;
  canvas.style.width  = s * W + 'px';
  canvas.style.height = s * H + 'px';
}

function resizeCanvas() {
  const base = Math.min(window.innerWidth / W, window.innerHeight / H);
  const s = base * _pinchCurrentScale;
  canvas.style.width  = s * W + 'px';
  canvas.style.height = s * H + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

  ORANGE:'#dc8228',ORANGE2:'#ffa03c',PURPLE:'#9650c8',TEAL:'#32aa9b',

};

const FONTS = { xxs:F(13), xs:F(15), sm:F(19), md:F(24), lg:F(33,true), title:F(60,true),

let keyPressed = null;

canvas.addEventListener('mousemove', e => {

  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);

canvas.addEventListener('mouseup',   e => { if(e.button===0){mouse.down=false;mouse.released=true;} });

  keys[e.key] = true; keyPressed = e.key;
  if(e.key.length === 1) charTyped += e.key;
  if(['Backspace','Enter','Escape','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { if(mobileInputActive) return; keys[e.key] = false; });
canvas.setAttribute('tabindex','0'); canvas.focus();

function consumeClick() { mouse.clicked = false; }
function consumeKey()   { keyPressed = null; charTyped = ''; }

// ─── DRAWING UTILS ───
function fillRect(x,y,w,h,fill,stroke,sw=1,r=0){
  ctx.beginPath();
  if(r>0) ctx.roundRect(x,y,w,h,r); else ctx.rect(x,y,w,h);
  ctx.fillStyle=fill; ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}
function strokeRect(x,y,w,h,stroke,sw=1,r=0){
  ctx.beginPath();
  if(r>0) ctx.roundRect(x,y,w,h,r); else ctx.rect(x,y,w,h);
  ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke();
}
function fillCirc(x,y,r,fill){ ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=fill;ctx.fill(); }
function strokeLine(x1,y1,x2,y2,col,w=1){ ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=col;ctx.lineWidth=w;ctx.stroke(); }

function drawText(text, font, color, x, y, align='left', baseline='top', maxW=0) {
  if (!text && text !== 0) return;
  ctx.font = font; ctx.fillStyle = color; ctx.textAlign = align; ctx.textBaseline = baseline;
  if (maxW > 0) {
    const words = String(text).split(' ');
    let line = '', lines = [];
    for (const w of words) {
      const test = line ? line+' '+w : w;
      if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
      else line = test;
    }
    if(line) lines.push(line);
    const lh = parseInt(font) * 1.3;
    for (let i=0; i<lines.length; i++) ctx.fillText(lines[i], x, y + i*lh);
    return;
  }
  ctx.fillText(String(text), x, y);
}

function drawBar(x, y, w, h, val, max, fg, bg=C.PANEL2, showPct=true) {
  const pct = Math.max(0, Math.min(1, max > 0 ? val/max : 0));
  fillRect(x,y,w,h,bg,'#00000000',0,3);
  if(pct > 0) fillRect(x,y,Math.round(w*pct),h,fg,'#00000000',0,3);
  strokeRect(x,y,w,h,C.BORDER,1,3);
  if(showPct) { ctx.font=FONTS.xxs; ctx.fillStyle=C.WHITE; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(Math.round(pct*100)+'%',x+w/2,y+h/2); }
}

function gradientRect(x,y,w,h,c1,c2) {
  const g = ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function lerpColor(a,b,t) {
  const [ar,ag,ab]=hexToRgb(a), [br,bg,bb]=hexToRgb(b);
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}
function moneyColor(v) { return v>=0 ? C.GREEN2 : C.RED2; }
function typeColor(t) { return {success:C.SUCCESS,warn:C.WARN,danger:C.DANGER,info:C.INFO,positive:C.GREEN,negative:C.RED}[t]||C.INFO; }
function formatMoney(v) {
  const a=Math.abs(v);
  if(a>=1e9) return (v/1e9).toFixed(2)+'Mrd€';
  if(a>=1e6) return (v/1e6).toFixed(2)+'Mio€';
  if(a>=1e3) return (v/1e3).toFixed(1)+'K€';
  return v.toFixed(2)+'€';
}
function miniChart(data, x,y,w,h, col) {
  fillRect(x,y,w,h,C.PANEL2,C.BORDER,1,4);
  const d = data.filter(v=>v>0);
  if(!d.length) { drawText('Keine Daten',FONTS.xxs,C.GRAY,x+w/2,y+h/2,'center','middle'); return; }
  const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
  const pts=data.map((v,i)=>[x+4+i/(data.length-1)*(w-8), y+h-4-(v-mn)/rng*(h-12)]);
  // fill
  ctx.beginPath(); ctx.moveTo(pts[0][0],y+h-4);
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(pts[pts.length-1][0],y+h-4); ctx.closePath();
  const [r,g,b]=hexToRgb(col); ctx.fillStyle=`rgba(${r},${g},${b},0.2)`; ctx.fill();
  // line
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
  if(data.length) drawText(formatMoney(data[data.length-1]),FONTS.xxs,col,x+w-4,y+4,'right','top');
}

function doenerIcon(cx,cy,size,anim) {
  const wobble=Math.sin(anim*3)*2;
  // spit
  strokeLine(cx,cy-size,cx,cy+size,'#8c8070',3);
  const layers=[[180,80,50],[200,100,60],[170,70,40],[190,90,55],[160,65,35]];
  for(let i=0;i<layers.length;i++){
    const [r,g,b]=layers[i];
    const off=Math.sin(anim*2+i)*wobble;
    const ly=cy-size+size/3+i*(size*2/layers.length);
    const lw=size+Math.sin(i*0.8)*size/3;
    const lh=size/4;
    ctx.beginPath(); ctx.ellipse(cx+off,ly,lw/2,lh/2,0,0,Math.PI*2);
    ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fill();
  }
  fillCirc(cx,cy-size,size/6,C.GOLD);
}

// ─── BUTTON ───
class Button {
  constructor(x,y,w,h,label,bg=C.GOLD,fg=C.BG,font=null) {
    this.x=x;this.y=y;this.w=w;this.h=h;this.label=label;
    this.bg=bg;this.fg=fg;this.font=font||FONTS.sm;
    this.enabled=true;this.hovered=false;this._pressed=false;
  }
  contains(px,py){ return px>=this.x&&px<=this.x+this.w&&py>=this.y&&py<=this.y+this.h; }
  update() {
    if(!this.enabled){ this.hovered=false; return false; }
    this.hovered=this.contains(mouse.x,mouse.y);
    if(this.hovered && mouse.clicked){ mouse.clicked=false; return true; }
    return false;
  }
  draw() {
    const bg = !this.enabled ? C.GRAY2 : this.hovered ? lerpColor(this.bg,C.WHITE,0.2) : this.bg;
    const fg = !this.enabled ? C.GRAY : this.fg;
    fillRect(this.x,this.y,this.w,this.h,bg,null,0,6);
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.07)';
    fillRect(this.x+2,this.y+2,this.w-4,this.h/2-2,'rgba(255,255,255,0.07)',null,0,4);
    drawText(this.label,this.font,fg,this.x+this.w/2,this.y+this.h/2,'center','middle');
  }
}

// ─── NOTIFICATION TOASTS ───
const toasts = [];
function addToast(msg,type='info') {
  if(toasts.length>=5) toasts.shift();
  if(toasts.length && toasts[toasts.length-1].msg===msg) return;
  toasts.push({msg,type,age:0,dur:4+msg.length*0.04});
}
function tickToasts(dt) { for(let i=toasts.length-1;i>=0;i--){ toasts[i].age+=dt; if(toasts[i].age>=toasts[i].dur) toasts.splice(i,1); } }
function drawToasts() {
  let y=H-20;
  for(let i=toasts.length-1;i>=0;i--){
    const t=toasts[i];
    let alpha=1;
    if(t.age<0.3) alpha=t.age/0.3;
    else if(t.age>t.dur-0.5) alpha=(t.dur-t.age)/0.5;
    alpha=Math.max(0,Math.min(1,alpha));
    const col=typeColor(t.type);
    ctx.font=FONTS.sm; ctx.textAlign='left';
    const tw=ctx.measureText(t.msg).width;
    const bw=Math.min(tw+24,600), bh=28;
    const bx=W-bw-20; y-=bh+8;
    ctx.globalAlpha=alpha;
    fillRect(bx,y,bw,bh,lerpColor(C.PANEL,col,0.15),col,1,6);
    fillRect(bx,y,4,bh,col,null,0,3);
    drawText(t.msg.length>75?t.msg.slice(0,72)+'...':t.msg,FONTS.sm,C.WHITE,bx+14,y+4,'left','top');
    ctx.globalAlpha=1;
  }
}

// ─── RECIPE ───
class Recipe {
  constructor() {
    this.name='Classic Döner'; this.fleisch='fleisch_basis'; this.brot='brot_normal';
    this.salat=true; this.tomate=true; this.zwiebel=true; this.kraut=true; this.gurke=true;
    this.sosse='sosse_knoblauch'; this.schaerfe=2; this.fleisch_menge=1.0; this.price=5.50;
  }
  ingredientCost() {
    let c = (INGREDIENT_COSTS[this.fleisch]||1.2)*this.fleisch_menge + (INGREDIENT_COSTS[this.brot]||0.25);
    if(this.salat) c+=INGREDIENT_COSTS.salat; if(this.tomate) c+=INGREDIENT_COSTS.tomate;
    if(this.zwiebel) c+=INGREDIENT_COSTS.zwiebel; if(this.kraut) c+=INGREDIENT_COSTS.kraut;
    if(this.gurke) c+=INGREDIENT_COSTS.gurke; c+=INGREDIENT_COSTS[this.sosse]||0.08;
    return c;
  }
  qualityScore() {
    let q=5.0;
    if(this.fleisch==='fleisch_premium') q+=2.0;
    if(this.brot==='brot_vollkorn') q+=0.5;
    if(this.salat) q+=0.3; if(this.tomate) q+=0.3; if(this.gurke) q+=0.2;
    q+=this.fleisch_menge*0.5;
    return Math.min(10,q);
  }
  profitMargin() { return this.price - this.ingredientCost(); }
  toObj() { return {...this}; }
  static fromObj(o) { const r=new Recipe(); Object.assign(r,o); return r; }
}

  reiniger:     {label:'Reiniger 🧹', speed:4,friendliness:5,exp:3,reliability:8,salary:700, color:C.TEAL},

const NAMES_M=['Mehmet','Cem','Murat','Hasan','Ibrahim','Yusuf','Ali','Kemal','Tariq','Ömer'];
const NAMES_F=['Fatima','Ayse','Zeynep','Leyla','Nadia','Sara','Derya','Melek'];
const SURNAMES=['Yilmaz','Kaya','Demir','Sahin','Celik','Ozturk','Aksoy','Polat'];
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function rndBetween(a,b){return a+(b-a)*Math.random();}
function rndInt(a,b){return Math.floor(rndBetween(a,b+1));}

class Staff {
  constructor(stype='azubi', level=1) {
    this.stype=stype; this.level=level;
    const all=[...NAMES_M,...NAMES_F];
    this.name=`${rnd(all)} ${rnd(SURNAMES)}`;
    const cfg=STAFF_TYPES[stype];
    const base=level*1.5;
    this.speed=Math.min(10,cfg.speed+rndInt(-1,2)+Math.floor(base*0.3));
    this.friendliness=Math.min(10,cfg.friendliness+rndInt(-1,2));
    this.experience=Math.min(10,cfg.exp+rndInt(-1,2)+Math.floor(base*0.2));
    this.reliability=Math.min(10,cfg.reliability+rndInt(-2,1));
    this.salary=cfg.salary*(1+(level-1)*0.15);
    this.morale=rndBetween(0.6,1.0);
    this.is_working=true;
    this.efficiency=this._calcEff();
  }
  _calcEff() { return (this.speed+this.experience+this.reliability)/25*this.morale; }
  tickMorale(mod=1.0) { this.morale=Math.max(0.2,Math.min(1,this.morale+rndBetween(-0.01*mod,0.005))); this.efficiency=this._calcEff(); }
  toObj() { return {stype:this.stype,level:this.level,name:this.name,speed:this.speed,friendliness:this.friendliness,experience:this.experience,reliability:this.reliability,salary:this.salary,morale:this.morale}; }
  static fromObj(o) { const s=new Staff(o.stype,o.level); Object.assign(s,o); s.efficiency=s._calcEff(); return s; }
}

// ─── BRANCH ───
class Branch {
  constructor(name,locType,city,country='Deutschland') {
    this.name=name; this.location_type=locType; this.city=city; this.country=country;
    const cfg=LOCATION_TYPES[locType]||LOCATION_TYPES.kleinststadt;
    this.rent=cfg.rent; this.base_foot_traffic=cfg.foot_traffic;
    this.hygiene=80; this.reputation=50;
    this.open_hour=10; this.close_hour=22; this.is_open=true; this.is_franchise=false;
    this.recipes=[new Recipe()];
    this.staff=[]; this.suppliers={};
    this.upgrades=new Set();
    this.marketing={flyer:false,social_media:false,influencer:false,stadion:false,tv:false};
    this.daily_customers=0; this.daily_revenue=0; this.daily_expenses=0;
    this.total_customers=0; this.total_revenue=0;
    this.sauce_popularity={};
    for(const k of Object.keys(SAUCE_NAMES)) this.sauce_popularity[k]=0;
    this.active_events=[]; this.capacity=15; this.age_days=0;
  }
  get staffEfficiency() {
    if(!this.staff.length) return 0.3;
    return Math.min(2.5, this.staff.reduce((a,s)=>a+s.efficiency,0));
  }
  get marketingMultiplier() {
    let m=1.0;
    if(this.marketing.flyer) m+=0.1;
    if(this.marketing.social_media) m+=0.2;
    if(this.marketing.influencer) m+=0.35;
    if(this.marketing.stadion) m+=0.5;
    if(this.marketing.tv) m+=0.8;
    return m;
  }
  get eventMultiplier() {
    let m=1.0;
    for(const ev of this.active_events){
      if(ev.effect.daily_customers) m*=ev.effect.daily_customers;
      if(ev.effect.capacity_mod) m*=ev.effect.capacity_mod;
    }
    return m;
  }
  getHourlyCust(hour) {
    let base=this.base_foot_traffic/12;
    if([12,13].includes(hour)) base*=2.5;
    else if([11,18,19].includes(hour)) base*=1.5;
    else if([10,14,17,20].includes(hour)) base*=1.0;
    else if(hour<10||hour>21) base*=0.1;
    else base*=0.6;
    base*=this.marketingMultiplier*this.eventMultiplier*(0.5+this.reputation/100)*this.staffEfficiency;
    return Math.max(0,Math.floor(base+rndBetween(-base*0.2,base*0.2)));
  }
  monthlyFixedCosts() {
    let c=this.rent;
    for(const s of this.staff) c+=s.salary;
    const mc={flyer:200,social_media:500,influencer:2000,stadion:5000,tv:15000};
    for(const [k,v] of Object.entries(this.marketing)) if(v) c+=mc[k]||0;
    return c;
  }
  tickDay(hygieneMod=1.0, moraleMod=1.0) {
    this.age_days++;
    this.hygiene=Math.max(0,this.hygiene-rndBetween(0.5,2.0)*hygieneMod);
    if(this.staff.some(s=>s.stype==='reiniger') && this.hygiene<80) this.hygiene=80;
    for(const s of this.staff) s.tickMorale(moraleMod);
    if(this.spa_cooldown>0) this.spa_cooldown--;
    for(let i=this.active_events.length-1;i>=0;i--){
      this.active_events[i].remaining=(this.active_events[i].remaining||this.active_events[i].duration)-1;
      if(this.active_events[i].remaining<=0) this.active_events.splice(i,1);
    }
    this.daily_customers=0; this.daily_revenue=0; this.daily_expenses=0;
  }
  toObj() {
    return {name:this.name,location_type:this.location_type,city:this.city,country:this.country,
      rent:this.rent,hygiene:this.hygiene,reputation:this.reputation,open_hour:this.open_hour,
      close_hour:this.close_hour,is_open:this.is_open,is_franchise:this.is_franchise,
      recipes:this.recipes.map(r=>r.toObj()),staff:this.staff.map(s=>s.toObj()),
      suppliers:this.suppliers,upgrades:[...this.upgrades],marketing:this.marketing,
      total_customers:this.total_customers,total_revenue:this.total_revenue,
      sauce_popularity:this.sauce_popularity,active_events:this.active_events,
      capacity:this.capacity,age_days:this.age_days,spa_cooldown:this.spa_cooldown||0};
  }
  static fromObj(o) {
    const b=new Branch(o.name,o.location_type,o.city,o.country||'Deutschland');
    Object.assign(b,o);
    b.recipes=o.recipes.map(r=>Recipe.fromObj(r));
    b.staff=o.staff.map(s=>Staff.fromObj(s));
    b.upgrades=new Set(o.upgrades||[]);
    b.active_events=o.active_events||[];
    b.spa_cooldown=o.spa_cooldown||0;
    if(!b.sauce_popularity) {b.sauce_popularity={}; for(const k of Object.keys(SAUCE_NAMES)) b.sauce_popularity[k]=0;}
    return b;
  }
}

// ─── GAME STATE ───
class GameState {
  constructor() {
    this.money=STARTING_MONEY; this.day=1; this.hour=8; this.minute=0; this.tick=0;
    this.difficulty='normal'; this.game_speed=1.0; this.paused=false;
    this.company_name='DÖNERIMPERIUM™';
    this.total_revenue=0; this.total_expenses=0; this.total_customers_served=0;
    this.market_share=0.05; this.loan_debt=0; this.loan_monthly_payment=0;
    this.branches=[]; this.research_tree=buildResearchTree(); this.active_research=null; this.research_progress_days=0;
    this.competitors=[];
    this.notifications=[];
    this.revenue_history=new Array(30).fill(0);
    this.customer_history=new Array(30).fill(0);
    this.expense_history=new Array(30).fill(0);
    this.victories_achieved=new Set(); this.unlocked_achievements=new Set();
    this.total_branches_ever=0; this.countries_present=new Set(['Deutschland']);
    this._tickAcc=0; this._humorTimer=0; this._humorInterval=60+Math.random()*60;
  }
  diff() {
    return {easy:{hd:1,md:1,ep:1,ca:1,st:0.4},normal:{hd:1.4,md:1.3,ep:1.4,ca:1.5,st:0.48},hard:{hd:2,md:1.8,ep:1.8,ca:2,st:0.55}}[this.difficulty]||{hd:1,md:1,ep:1,ca:1,st:0.4};
  }
  advanceTime(dt) {
    if(this.paused) return;
    this._tickAcc+=dt*this.game_speed;
    let ticks=Math.floor(this._tickAcc/TICK_RATE);
    this._tickAcc-=ticks*TICK_RATE;
    for(let i=0;i<Math.min(ticks,10);i++) this._processTick();
    this._humorTimer+=dt*this.game_speed;
    if(this._humorTimer>=this._humorInterval){
      this._humorTimer=0; this._humorInterval=45+Math.random()*75;
      if(Math.random()<0.7){const m=HUMOR_MESSAGES[Math.floor(Math.random()*HUMOR_MESSAGES.length)];this.addNotif(m[1],m[0]);}
    }
  }
  _processTick() {
    this.tick++; this.minute=(this.minute+10)%60;
    if(this.minute===0) this._processHour();
  }
  _processHour() {
    this.hour=(this.hour+1)%24;
    if(this.hour===0) this._processDay();
    else for(const b of this.branches) if(b.is_open&&b.open_hour<=this.hour&&this.hour<b.close_hour) this._simulateBranchHour(b);
  }
  _simulateBranchHour(branch) {
    const n=branch.getHourlyCust(this.hour);
    for(const recipe of branch.recipes) {
      const perRecipe=Math.max(0,Math.floor(n/branch.recipes.length));
      for(let i=0;i<perRecipe;i++) this._serveCustomer(branch,recipe);
    }
  }
  _serveCustomer(branch, recipe) {
    const d=this.diff();
    const ctypes=Object.keys(CUSTOMER_RATES);
    const ctype=this._pickCustomerType(this.hour);
    const cfg=CUSTOMER_RATES[ctype];
    const budget=rndBetween(...cfg.budget);
    const abandonChance=Math.max(0,(100-branch.hygiene)/200+(50-branch.reputation)/200);
    if(Math.random()<abandonChance) return;
    if(budget<recipe.price*0.7) return;
    let quality=recipe.qualityScore()+this._qualityBonus();
    const qn=(quality-5)/5;
    let satisfaction=qn*0.6;
    if(budget>=recipe.price) satisfaction+=0.2; else satisfaction-=((recipe.price-budget)/Math.max(recipe.price,1))*0.4*(1-qn*0.5);
    if(Math.random()<0.3) satisfaction+=0.2; // sauce match
    satisfaction=Math.max(0,Math.min(1,satisfaction));
    const price=Math.min(recipe.price,budget);
    const cost=recipe.ingredientCost()*this._costMod();
    const profit=price-cost;
    branch.daily_revenue+=profit; branch.total_revenue+=price; branch.daily_customers++;
    branch.total_customers++;
    const sosse=recipe.sosse||'sosse_knoblauch';
    branch.sauce_popularity[sosse]=(branch.sauce_popularity[sosse]||0)+1;
    this.money+=profit; this.total_revenue+=price; this.total_expenses+=cost; this.total_customers_served++;
    const repChange=(satisfaction-d.st)*0.3;
    branch.reputation=Math.max(0,Math.min(100,branch.reputation+repChange));
  }
  _pickCustomerType(hour) {
    const types=Object.entries(CUSTOMER_RATES);
    const weights=types.map(([,cfg])=>cfg.peak.includes(hour)?cfg.rate*2:Math.max(1,Math.floor(cfg.rate/3)));
    const total=weights.reduce((a,b)=>a+b,0); let r=Math.random()*total;
    for(let i=0;i<types.length;i++){r-=weights[i];if(r<=0)return types[i][0];}
    return 'student';
  }
  _qualityBonus() { return Object.values(this.research_tree).filter(n=>n.unlocked&&n.effect.quality_mod).reduce((a,n)=>a+n.effect.quality_mod,0); }
  _costMod() { return Object.values(this.research_tree).filter(n=>n.unlocked&&n.effect.cost_mod).reduce((a,n)=>a*n.effect.cost_mod,1); }
  _processDay() {
    this.day++;
    if(this.day%30===1) this._processMonthly();
    let totalDailyExp=0;
    for(const b of this.branches){
      const dc=b.monthlyFixedCosts()/30;
      b.daily_expenses=dc; totalDailyExp+=dc;
    }
    this.money-=totalDailyExp; this.total_expenses+=totalDailyExp;
    // Research
    if(this.active_research){
      const node=this.research_tree[this.active_research];
      if(node&&node.researching){
        this.research_progress_days++;
        node.progress=this.research_progress_days/node.dur;
        if(this.research_progress_days>=node.dur){
          node.unlocked=true; node.researching=false; this.active_research=null; this.research_progress_days=0;
          this.addNotif(`Forschung abgeschlossen: ${node.name}!`,'success');
          this._applyResearch(node);
        }
      }
    }
    for(const c of this.competitors) c.age_days++, c.market_share=Math.max(0.01,Math.min(0.8,c.market_share+rndBetween(-0.002,0.002*this.diff().ca)));
    this._checkRandomEvents(); this._checkVictory(); this._checkAchievements();
    const di=(this.day-1)%30;
    const dailyRev=this.branches.reduce((a,b)=>a+b.daily_revenue,0);
    const dailyCust=this.branches.reduce((a,b)=>a+b.daily_customers,0);
    this.revenue_history[di]=dailyRev; this.customer_history[di]=dailyCust; this.expense_history[di]=totalDailyExp;
    const BASE_COMP=800*12;
    const compC=this.competitors.length?this.competitors.reduce((a,c)=>a+Math.max(1,Math.floor(c.market_share*BASE_COMP)),0):dailyCust*5;
    const total=Math.max(1,dailyCust+compC);
    this.market_share=this.market_share*0.95+(dailyCust/total)*0.05;
    this.market_share=Math.max(0.001,Math.min(0.99,this.market_share));
    const d=this.diff();
    for(const b of this.branches) b.tickDay(d.hd,d.md);
    if(this.day%60===0&&this.branches.length) this._maybeAddCompetitor();
    if(this.money<-50000) this.addNotif('BANKROTT! Du bist pleite! Spiel verloren!','danger');

  }
  _processMonthly() {
    if(this.loan_monthly_payment>0){
      this.money-=this.loan_monthly_payment; this.total_expenses+=this.loan_monthly_payment;
      this.addNotif(`Kreditrate: -${this.loan_monthly_payment.toFixed(0)}€ (Schulden: ${this.loan_debt.toFixed(0)}€)`,'warn');
    }
    const mRev=this.revenue_history.reduce((a,b)=>a+b,0);
    this.addNotif(`Monatsabschluss: ${mRev.toFixed(0)}€ Umsatz, ${this.branches.length} Filialen`,'info');
  }
  _applyResearch(node) {
    if(node.effect.reputation_bonus) for(const b of this.branches) b.reputation=Math.min(100,b.reputation+node.effect.reputation_bonus);
    if(node.effect.capacity_mod) for(const b of this.branches) b.capacity=Math.floor(b.capacity*node.effect.capacity_mod);
  }
  _checkRandomEvents() {
    const d=this.diff();
    for(const ev of RANDOM_EVENTS){
      if(Math.random()<ev.prob*d.ep&&this.branches.length){
        const b=this.branches[Math.floor(Math.random()*this.branches.length)];
        if(ev.effect.hygiene_check){
          if(b.hygiene<50){const pen=rndBetween(500,2000);this.money-=pen;this.addNotif(`Gesundheitsamt: Bußgeld ${pen.toFixed(0)}€ für ${b.name}!`,'danger');}
          else this.addNotif(`Lebensmittelkontrolle bestanden! Bonus für ${b.name}!`,'success');
          continue;
        }
        const evCopy={...ev,effect:{...ev.effect},remaining:ev.duration};
        b.active_events.push(evCopy);
        this.addNotif(`${b.name}: ${ev.name} — ${ev.desc}`,ev.type);
      }
    }
  }
  _checkVictory() {
    if(this.branches.length>=500&&!this.victories_achieved.has('branches_500')){this.victories_achieved.add('branches_500');this.addNotif('🏆 SIEG! 500 Filialen erreicht! DÖNERIMPERIUM™ ist vollständig!','success');}
    if(this.total_revenue>=1e9&&!this.victories_achieved.has('milliarde')){this.victories_achieved.add('milliarde');this.addNotif('🏆 SIEG! Eine MILLIARDE Euro Umsatz! Legendär!','success');}
    if(this.countries_present.size>=20&&!this.victories_achieved.has('europa')){this.victories_achieved.add('europa');this.addNotif('🏆 SIEG! Europaweit! DÖNERIMPERIUM™ erobert Europa!','success');}
  }
  _checkAchievements() {
    for(const a of ACHIEVEMENTS){
      let met=false; try{met=a.check(this);}catch(e){}
      if(a.permanent!==false){if(met&&!this.unlocked_achievements.has(a.id)){this.unlocked_achievements.add(a.id);this.addNotif(`Achievement: ${a.name}!`,'success');}}
      else{if(met){if(!this.unlocked_achievements.has(a.id)) this.addNotif(`Achievement: ${a.name}!`,'success');this.unlocked_achievements.add(a.id);}else this.unlocked_achievements.delete(a.id);}
    }
  }
  _maybeAddCompetitor() {
    const cfg=COMPETITOR_TYPES[Math.floor(Math.random()*COMPETITOR_TYPES.length)];
    const city=rnd(this.branches.map(b=>b.city));
    const comp={name:cfg.name,quality:cfg.quality,price_mod:cfg.price_mod,color:cfg.color,city,market_share:rndBetween(0.05,0.2),reputation:rndBetween(40,80),age_days:0};
    this.competitors.push(comp);
    this.addNotif(`Neue Konkurrenz: ${comp.name} eröffnet in ${city}!`,'warn');
  }
  openBranch(name,locType,city,country='Deutschland') {
    const cfg=LOCATION_TYPES[locType]||LOCATION_TYPES.kleinststadt;
    const cost=cfg.rent*3;
    if(this.money<cost){this.addNotif(`Zu wenig Geld! Benötigt: ${cost.toFixed(0)}€`,'danger');return null;}
    this.money-=cost;
    const b=new Branch(name,locType,city,country);
    b.staff.push(new Staff('azubi',1));
    this.branches.push(b); this.total_branches_ever++; this.countries_present.add(country);
    this.addNotif(`Neue Filiale '${name}' in ${city} eröffnet! Kosten: ${cost.toFixed(0)}€`,'success');
    return b;
  }
  closeBranch(idx) { if(idx>=0&&idx<this.branches.length){const b=this.branches.splice(idx,1)[0];this.addNotif(`Filiale '${b.name}' geschlossen.`,'warn');} }
  startResearch(nodeId) {
    const node=this.research_tree[nodeId];
    if(!node||node.unlocked||node.researching) return false;
    for(const req of node.req) if(!this.research_tree[req].unlocked){this.addNotif(`Voraussetzung fehlt: ${this.research_tree[req].name}`,'warn');return false;}
    if(this.money<node.cost){this.addNotif(`Zu wenig Geld: ${node.cost.toFixed(0)}€`,'danger');return false;}
    if(this.active_research){this.addNotif('Es läuft bereits eine Forschung!','warn');return false;}
    this.money-=node.cost; node.researching=true; this.active_research=nodeId; this.research_progress_days=0;
    this.addNotif(`Forschung gestartet: ${node.name}!`,'info'); return true;
  }
  addNotif(msg,type='info') {
    if(this.notifications.length&&this.notifications[this.notifications.length-1].msg===msg) return;
    this.notifications.push({msg,type,time:this.day*24+this.hour,age:0});
    if(this.notifications.length>50) this.notifications.shift();
    addToast(msg,type);
  }
  tickNotifs(dt) { for(const n of this.notifications) n.age+=dt; }
  save(slot) {
    const obj=this.toObj();
    const json=JSON.stringify(obj,null,2);
    const blob=new Blob([json],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const day=this.day, name=(this.company_name||'save').replace(/[^a-z0-9]/gi,'_').slice(0,20);
    a.download=`doenermimperium_${name}_Tag${day}.txt`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    this.addNotif('Spielstand als .txt heruntergeladen!','success');
  }
  static load(slot) { return null; }
  static saveExists(slot) { return false; }
  toObj() {
    return {version:'1.0',money:this.money,day:this.day,hour:this.hour,minute:this.minute,tick:this.tick,
      company_name:this.company_name,total_revenue:this.total_revenue,total_expenses:this.total_expenses,
      total_customers_served:this.total_customers_served,difficulty:this.difficulty,market_share:this.market_share,
      loan_debt:this.loan_debt,loan_monthly_payment:this.loan_monthly_payment,
      branches:this.branches.map(b=>b.toObj()),
      research_tree:Object.fromEntries(Object.entries(this.research_tree).map(([k,v])=>[k,{...v}])),
      active_research:this.active_research,research_progress_days:this.research_progress_days,
      competitors:this.competitors,notifications:this.notifications.slice(-20),
      revenue_history:this.revenue_history,customer_history:this.customer_history,expense_history:this.expense_history,
      victories_achieved:[...this.victories_achieved],unlocked_achievements:[...this.unlocked_achievements],
      total_branches_ever:this.total_branches_ever,countries_present:[...this.countries_present],game_speed:this.game_speed};
  }
  static fromObj(o) {
    const gs=new GameState();
    Object.assign(gs,o);
    gs.branches=(o.branches||[]).map(b=>Branch.fromObj(b));
    const rt=buildResearchTree();
    for(const [k,v] of Object.entries(o.research_tree||{})) if(rt[k]){rt[k].unlocked=v.unlocked||false;rt[k].researching=v.researching||false;rt[k].progress=v.progress||0;}
    gs.research_tree=rt;
    gs.victories_achieved=new Set(o.victories_achieved||[]);
    gs.unlocked_achievements=new Set(o.unlocked_achievements||[]);
    gs.countries_present=new Set(o.countries_present||['Deutschland']);
    gs.notifications=o.notifications||[];
    gs.revenue_history=o.revenue_history||new Array(30).fill(0);
    gs.customer_history=o.customer_history||new Array(30).fill(0);
    gs.expense_history=o.expense_history||new Array(30).fill(0);
    return gs;
  }
}

const game = {
  gs: new GameState(), screen:'main_menu', prevScreen:'overview',
  inGame:false, anim:0, particles:[], pendingName:'',
  selectedDiff:1, selectedBranch:-1, selectedTab:0, selectedRecipe:0,
  branchScroll:0, achScroll:0,
  nameInput:'', namePhase:'', nameDialog:false,
  newBranchState:null, modal:null,
  hireRects:{}, fireRects:[], supplyRects:[],
  scale:1,

  init() {
    for(let i=0;i<40;i++) this.particles.push(this.makeParticle());
  },
  makeParticle() {
    return {x:Math.random()*W,y:Math.random()*H,vx:rndBetween(-20,20),vy:rndBetween(-40,-10),
      size:rndBetween(2,6),color:rnd([C.GOLD,C.ORANGE,C.RED,C.GREEN]),life:Math.random()*3,maxLife:rndBetween(2,5)};
  },
  setScreen(name) {
    if(name==='main_menu'){this.inGame=false;this.selectedBranch=-1;}
    this.prevScreen=this.screen; this.screen=name;
    if(name==='achievements') this.achScroll=0;
    if(name==='branches') this.selectedTab=0;
  },
  startNewGame(name, diff) {
    this.gs=new GameState();
    this.gs.company_name=name;
    this.gs.difficulty=diff;
    this.gs.openBranch(`${name} #1`,'kleinststadt','Dönerhausen');
    this.gs.addNotif(`Willkommen bei ${name}!`,'success');
    this.gs.addNotif('Tipp: Stelle Mitarbeiter ein und passe dein Rezept an!','info');
    this.inGame=true; this.selectedBranch=0; this.setScreen('overview');
  },
  loadGame(slot) {
    const input=document.createElement('input');
    input.type='file'; input.accept='.txt,.json';
    input.style.cssText='position:fixed;top:-999px;left:-999px;opacity:0;';
    input.onchange=e=>{
      const file=e.target.files[0];
      if(!file){document.body.removeChild(input);return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        document.body.removeChild(input);
        try{
          const gs=GameState.fromObj(JSON.parse(ev.target.result));
          game.gs=gs; gs.addNotif(`Spiel geladen! Tag ${gs.day}`,'success');
          game.inGame=true; game.selectedBranch=gs.branches.length?0:-1;
          game.setScreen('overview');
        }catch(err){ addToast('Ungültige Speicherdatei! Ist das wirklich ein DÖNERIMPERIUM-Save?','danger'); }
      };
      reader.readAsText(file);
    };
    // Remove if user cancels without picking
    input.addEventListener('cancel',()=>{ try{document.body.removeChild(input);}catch(e){} });
    document.body.appendChild(input);
    input.click();
  }
};
game.init();

}

// ─── BRANCHES SCREEN ───
function drawBranches() {
  const gs=game.gs; const y0=85;
  drawText('🏪 Filialen-Management',FONTS.lg,C.GOLD,10,y0,'left','top');

  // Branch list (left panel)
  const lx=10,ly=y0+35,lw=400,lh=575;
  fillRect(lx,ly,lw,lh,C.BG2,C.BORDER,1,4);
  const itemH=60;
  // scrolling
  const totalH=gs.branches.length*itemH;
  if(totalH>lh && mouse.x>=lx&&mouse.x<=lx+lw&&mouse.y>=ly&&mouse.y<=ly+lh){
    // handled below in event
  }
  ctx.save(); ctx.beginPath(); ctx.rect(lx,ly,lw,lh); ctx.clip();
  for(let i=0;i<gs.branches.length;i++){
    const b=gs.branches[i]; const iy=ly+i*itemH-game.branchScroll;
    if(iy+itemH<ly||iy>ly+lh) continue;
    const sel=i===game.selectedBranch;
    const bg=sel?lerpColor(C.GOLD,C.BG,0.7):i%2===0?C.PANEL:C.BG2;
    fillRect(lx,iy,lw,itemH,bg,null,0,0);
    strokeLine(lx,iy+itemH-1,lx+lw,iy+itemH-1,C.BORDER,1);
    const rc=b.reputation>=70?C.GREEN:b.reputation>=40?C.WARN:C.RED;
    drawText(`${b.is_open?'●':'○'} ${b.name}`,FONTS.sm,b.is_open?rc:C.GRAY,lx+10,iy+8,'left','top');
    drawText(`${b.city} | Rep:${b.reputation.toFixed(0)} | ${formatMoney(b.daily_revenue)}/Tag`,FONTS.xxs,C.TEXT3,lx+10,iy+30,'left','top');
    if(mouse.clicked&&mouse.x>=lx&&mouse.x<=lx+lw&&mouse.y>=iy&&mouse.y<=iy+itemH){
      game.selectedBranch=i; game.selectedTab=0; consumeClick();
    }
  }
  if(!gs.branches.length) drawText('Keine Filialen',FONTS.md,C.GRAY,lx+lw/2,ly+lh/2,'center','middle');
  ctx.restore();

  // Buttons below list
  const btnNew=new Button(lx,ly+lh+8,190,36,'+ Neue Filiale',C.GOLD,C.BG,FONTS.sm);
  const btnClose=new Button(lx+200,ly+lh+8,200,36,'Filiale schließen',C.RED,C.WHITE,FONTS.sm);
  btnClose.enabled=game.selectedBranch>=0;
  btnNew.draw(); btnClose.draw();
  if(btnNew.update()){game.newBranchState={phase:'name',name:'',city:'',country:'Deutschland',locType:'kleinststadt'};activateMobileInput('');}
  if(btnClose.update()&&game.selectedBranch>=0){
    const b=gs.branches[game.selectedBranch];
    game.modal={title:'Filiale schließen?',msg:`Möchtest du '${b.name}' wirklich schließen?`,
      btns:[{label:'Schließen',color:C.RED,result:'close'},{label:'Abbrechen',color:C.PANEL2,result:null}]};
  }

  if(game.newBranchState){drawNewBranchDialog();return;}
  if(game.modal){drawModal();return;}

  // Right panel
  if(game.selectedBranch<0||game.selectedBranch>=gs.branches.length){
    drawText('← Wähle eine Filiale aus',FONTS.md,C.GRAY,700,400,'center','middle'); return;
  }
  const branch=gs.branches[game.selectedBranch];

  // Tabs
  const tabs=['Info','Rezept','Personal','Marketing','Lieferkette'];
  const tx=420,ty=y0+35,tw=840,th=32;
  const tabW=tw/tabs.length;
  fillRect(tx,ty,tw,th,C.PANEL2,C.BORDER,1,4);
  for(let i=0;i<tabs.length;i++){
    const tbx=tx+i*tabW;
    if(i===game.selectedTab){fillRect(tbx,ty,tabW,th,C.PANEL,null,0,4);strokeLine(tbx,ty+th-2,tbx+tabW,ty+th-2,C.GOLD,2);}
    drawText(tabs[i],FONTS.sm,i===game.selectedTab?C.GOLD:C.GRAY,tbx+tabW/2,ty+th/2,'center','middle');
    if(mouse.clicked&&mouse.x>=tbx&&mouse.x<=tbx+tabW&&mouse.y>=ty&&mouse.y<=ty+th){game.selectedTab=i;consumeClick();}
  }

  if(game.selectedTab===0) drawBranchInfo(branch);
  else if(game.selectedTab===1) drawBranchRecipe(branch);
  else if(game.selectedTab===2) drawBranchStaff(branch);
  else if(game.selectedTab===3) drawBranchMarketing(branch);
  else if(game.selectedTab===4) drawBranchSupply(branch);
}

const RESEARCH_POS = {
  schnittmaschine:  [150,200], premium_zutaten:[150,380], ki_kasse:[380,200],
  schnelle_lieferung:[380,380], eigene_logistik:[610,380], franchise:[610,200],
  brotfabrik:[840,380], fleischproduktion:[840,540], solar_energie:[150,540],
  loyalty_app:[380,540], geheimrezept:[610,540], mega_grill:[840,200],
};
const NODE_SIZE=80;

function drawResearch() {
  const gs=game.gs; const y0=85;
  drawText('🔬 Forschung & Entwicklung',FONTS.lg,C.GOLD,20,y0,'left','top');

  if(gs.active_research){
    const node=gs.research_tree[gs.active_research];
    drawText(`Aktive Forschung: ${node.name} [${Math.floor(node.progress*100)}%]`,FONTS.sm,C.TEAL,W-20,y0+5,'right','top');
    drawBar(W-400,y0+28,380,12,node.progress,1,C.TEAL,undefined,false);
  }

  // Connections
  for(const [nid,node] of Object.entries(gs.research_tree)){
    if(!RESEARCH_POS[nid]) continue;
    const [nx,ny]=RESEARCH_POS[nid];
    for(const req of node.req){
      if(!RESEARCH_POS[req]) continue;
      const [rx2,ry2]=RESEARCH_POS[req];
      const reqNode=gs.research_tree[req];
      strokeLine(rx2+30,ry2+y0-85+85,nx-30,ny+y0-85+85,reqNode.unlocked?C.GREEN:C.GRAY2,2);
    }
  }

  let hoveredNode=null;
  for(const [nid,node] of Object.entries(gs.research_tree)){
    if(!RESEARCH_POS[nid]) continue;
    const [nx,ny2]=RESEARCH_POS[nid];
    const ny=ny2+y0-85+85;
    const ns=NODE_SIZE;
    const hovered=mouse.x>=nx-ns/2&&mouse.x<=nx+ns/2&&mouse.y>=ny-ns/2&&mouse.y<=ny+ns/2;
    if(hovered) hoveredNode=nid;

    let bg,border;
    if(node.unlocked){bg=lerpColor(C.GREEN,C.BG,0.5);border=C.GREEN;}
    else if(node.researching){const t=Math.abs(Math.sin(game.anim*2));bg=lerpColor(C.TEAL,C.BG,0.4+t*0.2);border=C.TEAL;}
    else if(node.req.some(r=>!gs.research_tree[r].unlocked)){bg=C.BG2;border=C.GRAY2;}
    else{bg=C.PANEL;border=hovered?C.GOLD:C.BORDER;}

    fillRect(nx-ns/2,ny-ns/2,ns,ns,bg,border,2,8);
    const icon=node.unlocked?'✓':node.researching?`${Math.floor(node.progress*100)}%`:'🔬';
    const ic=node.unlocked?C.GREEN:node.researching?C.TEAL:C.GRAY;
    drawText(icon,FONTS.sm,ic,nx,ny-16,'center','top');
    const shortName=node.name.length>14?node.name.slice(0,12)+'..':node.name;
    const words=shortName.split(' ');
    for(let li=0;li<Math.min(2,words.length);li++) drawText(words[li],FONTS.xxs,C.TEXT,nx,ny+4+li*14,'center','top');
    if(hovered) drawText(`${formatMoney(node.cost)} | ${node.dur}T`,FONTS.xxs,C.GOLD,nx,ny+46,'center','top');

    if(hovered&&mouse.clicked){consumeClick();gs.startResearch(nid);}
  }

  // Tooltip
  if(hoveredNode){
    const node=gs.research_tree[hoveredNode];
    const tw=320,th=105;
    const tx=Math.min(mouse.x+15,W-tw-5), ty=Math.min(mouse.y+15,H-th-5);
    fillRect(tx,ty,tw,th,C.PANEL,C.GOLD,1,8);
    drawText(node.name,FONTS.sm,C.GOLD,tx+10,ty+10,'left','top');
    ctx.font=FONTS.xs; ctx.fillStyle=C.TEXT; ctx.textAlign='left'; ctx.textBaseline='top';
    // word wrap desc
    const maxW=300; const words2=node.desc.split(' '); let line2='';
    const lines2=[]; for(const w of words2){const t=line2?line2+' '+w:w;if(ctx.measureText(t).width>maxW&&line2){lines2.push(line2);line2=w;}else line2=t;} if(line2)lines2.push(line2);
    for(let i=0;i<lines2.length;i++) drawText(lines2[i],FONTS.xs,C.TEXT,tx+10,ty+35+i*16,'left','top');
    const status=node.unlocked?'✓ Abgeschlossen':node.researching?`In Bearbeitung ${Math.floor(node.progress*100)}%`:`Kosten: ${formatMoney(node.cost)} | ${node.dur} Tage`;
    drawText(status,FONTS.xs,node.unlocked?C.GREEN:C.GOLD,tx+10,ty+80,'left','top');
  }

  // Legend
  let ly=H-58;
  for(const [col,lbl] of [[C.GREEN,'Abgeschlossen'],[C.TEAL,'In Bearbeitung'],[C.GOLD,'Verfügbar'],[C.GRAY2,'Gesperrt']]){
    fillCirc(20,ly+8,6,col); drawText(lbl,FONTS.xxs,C.TEXT2,32,ly+2,'left','top'); ly+=18;
  }
}

  drawText('🏢 Unternehmenskennzahlen',FONTS.sm,C.GOLD,450,sy+12,'left','top');
  const kpis=[['Filialen:',String(gs.branches.length)],['Gesamtkunden:',gs.total_customers_served.toLocaleString('de')],['Gesamtumsatz:',formatMoney(gs.total_revenue)],['Länder:',String(gs.countries_present.size)],['Spieltage:',String(gs.day)]];
  for(let i=0;i<kpis.length;i++){
    drawText(kpis[i][0],FONTS.xs,C.TEXT2,450,sy+40+i*24,'left','top');
    drawText(kpis[i][1],FONTS.sm,C.GOLD,830,sy+38+i*24,'right','top');
  }

  // Competitors
  fillRect(860,sy,380,170,C.PANEL,C.BORDER,1,8);
  drawText('⚔ Konkurrenz',FONTS.sm,C.GOLD,870,sy+12,'left','top');
  if(gs.competitors.length) for(let i=0;i<Math.min(5,gs.competitors.length);i++){
    const c=gs.competitors[i]; const ry=sy+38+i*24;
    drawText(c.name.slice(0,20),FONTS.xxs,c.color,870,ry,'left','top');
    drawText(`Marktanteil: ${(c.market_share*100).toFixed(1)}%`,FONTS.xxs,C.TEXT2,1080,ry,'left','top');
  } else drawText('Noch keine Konkurrenz!',FONTS.sm,C.GRAY,1050,sy+90,'center','middle');
}

// ─── FINANCE SCREEN ───
function drawFinance() {
  const gs=game.gs; const y0=85;
  drawText('💰 Finanzübersicht',FONTS.lg,C.GOLD,20,y0,'left','top');
  const boxes=[['Kapital',formatMoney(gs.money),moneyColor(gs.money)],['Gesamtumsatz',formatMoney(gs.total_revenue),C.GREEN],['Gesamtausgaben',formatMoney(gs.total_expenses),C.RED2],['Nettogewinn',formatMoney(gs.total_revenue-gs.total_expenses),moneyColor(gs.total_revenue-gs.total_expenses)]];
  for(let i=0;i<boxes.length;i++){
    const bx=20+i*310;
    fillRect(bx,y0+45,295,80,C.PANEL,C.BORDER,1,8);
    drawText(boxes[i][0],FONTS.sm,C.TEXT2,bx+12,y0+55,'left','top');
    drawText(boxes[i][1],FONTS.lg,boxes[i][2],bx+148,y0+75,'center','middle');
  }

  // Revenue/expense chart
  const cy=y0+150;
  fillRect(20,cy,820,180,C.PANEL,C.BORDER,1,8);
  drawText('📈 Gewinn vs Ausgaben (30 Tage)',FONTS.sm,C.GOLD,30,cy+12,'left','top');
  const cr=[30,cy+38,800,130];
  fillRect(cr[0],cr[1],cr[2],cr[3],C.BG2,null,0,4);
  const allVals=[...gs.revenue_history,...gs.expense_history].filter(v=>v>0);
  const maxV=Math.max(1,...allVals);
  function drawFinLine(data,col){
    const pts=[];
    for(let i=0;i<data.length;i++){if(data[i]<=0)continue;const px=cr[0]+Math.round(i/29*(cr[2]-8))+4;const py=cr[1]+cr[3]-4-Math.round(data[i]/maxV*(cr[3]-12));pts.push([px,py]);}
    if(pts.length>=2){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();}
  }
  drawFinLine(gs.revenue_history,C.GREEN); drawFinLine(gs.expense_history,C.RED);
  drawText('— Gewinn',FONTS.xxs,C.GREEN,cr[0]+cr[2]-10,cy+40,'right','top');
  drawText('— Ausgaben',FONTS.xxs,C.RED,cr[0]+cr[2]-10,cy+55,'right','top');

  // Per-branch table
  const ty=y0+350;
  fillRect(20,ty,820,290,C.PANEL,C.BORDER,1,8);
  drawText('🏪 Filialkosten',FONTS.md,C.GOLD,30,ty+12,'left','top');
  const hdrs2=['Filiale','Miete','Personal','Marketing','Fixkosten','Monatsgew.'];
  const hx=[30,180,310,440,560,660];
  for(let i=0;i<hdrs2.length;i++) drawText(hdrs2[i],FONTS.xs,C.GOLD,hx[i],ty+36,'left','top');
  strokeLine(25,ty+52,835,ty+52,C.BORDER,1);
  const sortedB=[...gs.branches].sort((a,b)=>b.monthlyFixedCosts()-a.monthlyFixedCosts()).slice(0,7);
  let totRent=0,totStaff=0,totMktg=0;
  for(let i=0;i<sortedB.length;i++){
    const b=sortedB[i]; const ry=ty+58+i*32;
    const rent=b.rent; const staff=b.staff.reduce((a,s)=>a+s.salary,0);
    const mktg=Object.entries(b.marketing).filter(([,v])=>v).reduce((a,[k])=>a+{flyer:200,social_media:500,influencer:2000,stadion:5000,tv:15000}[k],0);
    const total=rent+staff+mktg; const profit=b.daily_revenue*30-total;
    totRent+=rent; totStaff+=staff; totMktg+=mktg;
    fillRect(25,ry-2,810,28,i%2===0?C.PANEL:C.BG2,null,0,3);
    const vals2=[[b.name.slice(0,14),C.TEXT],[`${rent.toFixed(0)}€`,C.RED2],[`${staff.toFixed(0)}€`,C.RED2],[`${mktg.toFixed(0)}€`,C.ORANGE],[`${total.toFixed(0)}€`,C.RED],[formatMoney(profit),moneyColor(profit)]];
    for(let j=0;j<vals2.length;j++) drawText(vals2[j][0],FONTS.xxs,vals2[j][1],hx[j],ry+6,'left','top');
  }

  // Loan panel
  const lx=860,lyl=y0+150;
  fillRect(lx,lyl,380,200,C.PANEL,C.BORDER,1,8);
  drawText('🏦 Kreditoption',FONTS.sm,C.GOLD,lx+10,lyl+12,'left','top');
  drawText('Sofortkredit: 10.000€ | Zinsen: 5%/Mo',FONTS.sm,C.TEXT,lx+10,lyl+45,'left','top');
  const dc=gs.loan_debt>0?C.RED:C.TEXT2;
  drawText(`Schulden: ${gs.loan_debt.toFixed(0)}€  Rate: ${gs.loan_monthly_payment.toFixed(0)}€/Mo`,FONTS.xs,dc,lx+10,lyl+75,'left','top');
  const btnL10=new Button(lx+10,lyl+100,160,36,'10K€ Kredit',C.TEAL,C.BG,FONTS.sm);
  const btnL50=new Button(lx+10,lyl+145,160,36,'50K€ Kredit',C.BLUE,C.BG,FONTS.sm);
  btnL10.draw(); btnL50.draw();
  if(btnL10.update()){gs.money+=10000;gs.loan_debt+=10000;gs.loan_monthly_payment+=500;gs.addNotif('10.000€ Kredit aufgenommen! +500€ Zinsen/Mo','warn');}
  if(btnL50.update()){gs.money+=50000;gs.loan_debt+=50000;gs.loan_monthly_payment+=2500;gs.addNotif('50.000€ Kredit aufgenommen! +2500€ Zinsen/Mo','warn');}
}

// ─── OPTIONS SCREEN ───
function drawOptions() {
  const gs=game.gs; const y0=85;
  drawText('⚙ Optionen',FONTS.lg,C.GOLD,W/2,y0+20,'center','top');
  const cx=W/2;
  drawText('Spielgeschwindigkeit:',FONTS.sm,C.TEXT2,cx-160,155,'left','top');
  for(let i=0;i<4;i++){
    const [lbl,spd]=[['1x',1.0],['2x',3.0],['4x',8.0],['8x',16.0]][i];
    const rx=cx-160+i*80, ry=178;
    const active=gs.game_speed===spd;
    fillRect(rx,ry,74,30,active?C.GOLD:C.PANEL2,active?C.GOLD:C.BORDER,1,5);
    drawText(lbl,FONTS.sm,active?C.BG:C.TEXT,rx+37,ry+15,'center','middle');
    if(mouse.clicked&&mouse.x>=rx&&mouse.x<=rx+74&&mouse.y>=ry&&mouse.y<=ry+30){gs.game_speed=spd;consumeClick();}
  }

  const btnSave=new Button(cx-160,215,300,56,'💾 Spiel speichern (.txt)',C.GOLD,C.BG,FONTS.md);
  const btnMenu=new Button(cx-160,295,300,50,'Zurück zum Hauptmenü',C.RED,C.WHITE);
  btnSave.draw(); btnMenu.draw();
  if(btnSave.update()) gs.save(0);
  if(btnMenu.update()){game.inGame=false;game.setScreen('main_menu');}

  fillRect(cx-160,365,300,60,C.PANEL,C.BORDER,1,8);
  drawText('💡 Tipp: Die .txt-Datei',FONTS.xs,C.GOLD,cx-148,373,'left','top');
  drawText('kann über "Spiel laden"',FONTS.xs,C.TEXT2,cx-148,393,'left','top');
  drawText('im Hauptmenü geladen werden.',FONTS.xs,C.TEXT2,cx-148,413,'left','top');

  // Tips
  fillRect(W-450,200,420,360,C.PANEL,C.BORDER,1,8);
  drawText('💡 Spieltipps',FONTS.md,C.GOLD,W-240,218,'center','top');
  const tips=['Eröffne zuerst in Kleinstädten,','bevor du in Großstädte gehst.','','Stelle Dönermeister + Azubi ein.','','Forsche früh in Schnittmaschine.','','Hygiene verfällt täglich – reinige','regelmäßig oder stelle Reiniger ein.','','Social Media lohnt sich ab Tag 1!','','Spare für Premium-Zutaten-Forschung.'];
  for(let i=0;i<tips.length;i++) drawText(tips[i],FONTS.xs,C.TEXT2,W-440,248+i*20,'left','top');
}

// ─── ACHIEVEMENTS SCREEN ───
function drawAchievements() {
  const gs=game.gs;
  drawText('Achievements',FONTS.lg,C.GOLD,W/2,85,'center','top');
  const unlocked=ACHIEVEMENTS.filter(a=>gs.unlocked_achievements.has(a.id));
  drawText(`${unlocked.length} / ${ACHIEVEMENTS.length} freigeschaltet`,FONTS.sm,C.TEXT2,W/2,125,'center','top');

  const cols=2, cw=(W-60)/cols, ch=72, gap=10;
  const startY=150-game.achScroll;
  const all=[...unlocked,...ACHIEVEMENTS.filter(a=>!gs.unlocked_achievements.has(a.id))];
  const totalRows=Math.ceil(all.length/cols);
  const maxScroll=Math.max(0,totalRows*(ch+gap)-(H-210));
  // scroll via mouse
  if(mouse.y>145&&mouse.y<H-65&&game.screen==='achievements'){
    // handled in scroll event below
  }

  ctx.save(); ctx.beginPath(); ctx.rect(0,145,W,H-210); ctx.clip();
  for(let i=0;i<all.length;i++){
    const col2=i%cols, row=Math.floor(i/cols);
    const cx2=20+col2*(cw+gap), cy2=startY+row*(ch+gap);
    if(cy2+ch<145||cy2>H-65) continue;
    const done=gs.unlocked_achievements.has(all[i].id);
    fillRect(cx2,cy2,cw,ch,done?lerpColor(C.PANEL,C.GOLD,0.1):C.PANEL,done?C.GOLD:C.PANEL2,2,8);
    drawText(all[i].icon,FONTS.lg,done?C.GOLD:C.GRAY,cx2+36,cy2+ch/2,'center','middle');
    drawText(all[i].name,FONTS.sm,done?C.GOLD:C.TEXT2,cx2+62,cy2+14,'left','top');
    drawText(all[i].desc,FONTS.xs,done?C.TEXT2:C.GRAY,cx2+62,cy2+38,'left','top');
    if(done) drawText('✓',FONTS.md,C.GREEN,cx2+cw-18,cy2+ch/2,'center','middle');
  }
  ctx.restore();

  const btnBack=new Button(W/2-80,H-52,160,40,'← Zurück',C.PANEL2,C.TEXT);
  btnBack.draw(); if(btnBack.update()) game.setScreen(game.prevScreen||'overview');
  if(keyPressed==='Escape'){game.setScreen(game.prevScreen||'overview');consumeKey();}
}

// ─── MAIN LOOP ───
let lastTime=0;

function update(dt) {
  game.anim+=dt;
  // Particles (main menu only)
  if(game.screen==='main_menu') for(const p of game.particles){
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life+=dt;
    if(p.life>=p.maxLife||p.y<-10) Object.assign(p,game.makeParticle(),{y:H+10});
  }
  // Scroll: branch list
  if(game.screen==='branches'||game.screen==='staff'){
    const gs=game.gs; const lh=575, itemH=60;
    const totalH=gs.branches.length*itemH;
    if(totalH>lh) {
      if(keys['ArrowUp']&&mouse.x<420) game.branchScroll=Math.max(0,game.branchScroll-5);
      if(keys['ArrowDown']&&mouse.x<420) game.branchScroll=Math.min(totalH-lh,game.branchScroll+5);
    }
  }
  if(game.screen==='achievements'){
    const cols=2,ch=72,gap=10;
    const totalRows=Math.ceil(ACHIEVEMENTS.length/cols);
    const maxScroll=Math.max(0,totalRows*(ch+gap)-(H-210));
    if(keys['ArrowUp']) game.achScroll=Math.max(0,game.achScroll-5);
    if(keys['ArrowDown']) game.achScroll=Math.min(maxScroll,game.achScroll+5);
  }

  if(game.inGame){
    game.gs.advanceTime(dt);
    game.gs.tickNotifs(dt);
  }
  tickToasts(dt);
}

// Scroll wheel
window.addEventListener('wheel', e => {
  if(game.screen==='achievements'){
    const cols=2,ch=72,gap=10;
    const totalRows=Math.ceil(ACHIEVEMENTS.length/cols);
    const maxScroll=Math.max(0,totalRows*(ch+gap)-(H-210));
    game.achScroll=Math.max(0,Math.min(maxScroll,game.achScroll+e.deltaY*0.5));
  }
  if((game.screen==='branches'||game.screen==='staff')&&mouse.x<420){
    const gs=game.gs; const lh=575,itemH=60;
    const totalH=gs.branches.length*itemH;
    if(totalH>lh) game.branchScroll=Math.max(0,Math.min(totalH-lh,game.branchScroll+e.deltaY*0.5));
  }
},{passive:true});

function draw() {
  ctx.clearRect(0,0,W,H);
  fillRect(0,0,W,H,C.BG);

  if(!game.inGame){
    if(game.screen==='main_menu') drawMainMenu();
    else if(game.screen==='difficulty') drawDifficulty();
    else if(game.screen==='load_menu') drawLoadMenu();
    else drawMainMenu();
    drawToasts();
    return;
  }

  drawHUD();
  ctx.save(); ctx.beginPath(); ctx.rect(0,78,W,H-78); ctx.clip();
  if(game.screen==='overview') drawOverview();
  else if(game.screen==='branches'||game.screen==='staff') drawBranches();
  else if(game.screen==='research') drawResearch();
  else if(game.screen==='stats') drawStats();
  else if(game.screen==='finance') drawFinance();
  else if(game.screen==='options') drawOptions();
  else if(game.screen==='achievements') drawAchievements();
  else drawOverview();
  ctx.restore();

  // FPS (optional, bottom left)
  // fps display removed
  drawToasts();
}

function loop(ts) {
  const dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts;
  update(dt);
  draw();
  // Reset per-frame input
  mouse.clicked=false; mouse.released=false;
  keyPressed=null; charTyped='';
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(loop); });
</script>
